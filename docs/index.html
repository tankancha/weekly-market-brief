<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Weekly Market Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
<!-- Markdown rendering + sanitization (pinned major versions) -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>

<!-- Mobile-only top bar -->
<div class="topbar">
  <button id="nav-toggle" class="nav-toggle" aria-label="Toggle archive" aria-expanded="false">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 4.5h14M2 9h14M2 13.5h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    <span>Archive</span>
  </button>
  <div class="topbar-title">Weekly Market Brief</div>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-name">Weekly Market Brief</div>
      <div class="brand-sub">Impact-ranked market-news digest</div>
    </div>
    <nav class="archive" id="archive" aria-label="Report archive">
      <div class="archive-loading">Loading archive…</div>
    </nav>
    <div class="sidebar-foot">
      <a href="https://github.com/tankancha/weekly-market-brief" target="_blank" rel="noopener">source on GitHub</a>
    </div>
  </aside>

  <!-- Scrim closes the mobile drawer -->
  <div class="scrim" id="scrim" hidden></div>

  <main class="reader">
    <header class="rhead" id="rhead">
      <div class="rhead-eyebrow" id="rhead-eyebrow">Weekly Market Brief</div>
      <h1 class="rhead-title" id="rhead-title">Weekly Market Brief</h1>
      <div class="rhead-meta" id="rhead-meta"></div>
    </header>
    <section class="cockpit" id="cockpit" hidden></section>
    <button class="reveal-btn" id="revealBtn" hidden><span class="rc">▸</span> <span class="rl">Read full analysis</span></button>
    <article class="report" id="report" hidden></article>
  </main>
</div>

<script src="./app.js"></script>
</body>
</html>
